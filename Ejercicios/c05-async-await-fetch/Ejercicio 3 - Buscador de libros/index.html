<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Ejercicio 3 – Buscador de libros</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    .fila { display: flex; gap: 8px; margin-bottom: 1rem; }
    input { flex: 1; padding: 8px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; }
    button { padding: 8px 16px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; }
    #resultados { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .tarjeta { border: 1px solid #ddd; border-radius: 8px; padding: 12px; }
    .titulo { font-weight: bold; font-size: 13px; margin-bottom: 4px; }
    .autor { font-size: 12px; color: #555; }
    .anio  { font-size: 11px; color: #888; margin-top: 4px; }
    .error { color: red; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Buscador de libros – Open Library</h1>

  <div class="fila">
    <input id="busqueda" type="text" placeholder="Título, autor, ISBN..." />
    <button id="btn-buscar">Buscar</button>
  </div>

  <div id="resultados"></div>

  <!-- En producción usarías tsc para compilar buscador-libros.ts -->
  <!-- Para probar localmente podés copiar el JS resultante aquí  -->
  <script src="app.js"></script>
</body>
</html>
